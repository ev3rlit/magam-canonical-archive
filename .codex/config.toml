[agents]
max_threads = 4
max_depth = 1

[agents.spark-task-worker]
description = "Fast implementation worker for one parallel-safe speckit task or a narrowly scoped batch. Best for tests, fixtures, docs, contracts, and isolated modules with low merge risk."
config_file = "agents/spark-task-worker.toml"

[agents.task-worker]
description = "General implementation worker for foundational or integration tasks that touch shared files, phase gates, or cross-layer behavior."
config_file = "agents/task-worker.toml"

[agents.feature-prd-writer]
description = "Product-facing PRD writer for a single feature README. Best for drafting or refining README.md so it becomes a strong input to the speckit workflow."
config_file = "agents/feature-prd-writer.toml"

[agents.speckit-master]
description = "Speckit pipeline master for one feature. Accepts feature text or a file path, then drives specify, optional clarify, plan, tasks, and analyze, and stops before implementation."
config_file = "agents/speckit-master.toml"

[agents.agent-evaluator]
description = "Evaluation and tuning agent for Codex agents. Runs agents, scores outcomes with optional human feedback, and proposes or applies the smallest useful prompt improvements."
config_file = "agents/agent-evaluator.toml"
